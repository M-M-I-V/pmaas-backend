# docker-compose.yml — Local Development Stack
# Starts PostgreSQL for local development.
# The Spring Boot application itself is run with `mvn spring-boot:run` locally
# (outside Docker) for fast hot-reload during development.
#
# USAGE:
#   Start the database:         docker-compose up -d
#   Stop everything:            docker-compose down
#   Destroy data too:           docker-compose down -v
#   View logs:                  docker-compose logs -f postgres
#   Connect via terminal:       psql -h localhost -p 5432 -U <DB_USER> -d <DB_NAME>
#
# CREDENTIALS:
# Provided via the local .env file. Ensure your application-local.yml
# matches these credentials.

services:
  postgres:
    image: postgres:17-alpine
    container_name: pmaas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
